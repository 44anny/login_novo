<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="slyle.css">
    <title>Inicio</title>
</head>
<body class="home">
<h3>Seja Bem- Vindo ao Sabor Raiz!</h3>
 
    <main>
        <section class="categories">
            <div class="category-item">
                <div class="img-circle"><img src="imagens/pizza.jpg" alt="Pizza"></div>
                <span>Pizza</span>
            </div>
            <div class="category-item">
                <div class="img-circle"><img src="imagens/mejores-hamburguesas-de-mexico-990x688.jpg" alt="Hamburgue"></div>
                <span>Hamburgue</span>
            </div>
            <div class="category-item">
                <div class="img-circle"><img src="imagens/Tapioca-.jpeg" alt="Tapioca"></div>
                <span>Tapioca</span>
            </div>
            <div class="category-item">
                <div class="img-circle"><img src="imagens/cuscuz-paulista-555x349.jpg" alt="Cuscuz"></div>
                <span>Cuscuz</span>
            </div>
            <div class="category-item">
                <div class="img-circle"><img src="imagens/acai2.webp" alt="Açai"></div>
                <span>Açai</span>
            </div>
            <div class="category-item">
                <div class="img-circle"><img src="imagens/4-sucos-funcionais-e-praticos-1024x683.jpg" alt="Suco"></div>
                <span>Suco</span>
            </div>
        </section>

        <div class="search-bar">
            <i class="fa-solid fa-magnifying-glass"></i>
             <label for="produto">Produto a comprar *</label>
        <select id="produto" name="produto" required>
            <option value="">Selecione</option>
            <option value="Pizza">Pizza</option>
            <option value="Hamburgue">Hamburgue</option>
            <option value="Tapioca">Tapioca</option>
            <option value="Cuscuz">Cuscuz</option>
            <option value="Acai">Açai</option>
            <option value="Suco">Suco</option>
        </select>
        
  
    </div>
    <form id="homeForm">
        <button type="submit">Enviar</button>
    </form>
    


    <script src="script.js"></script>

    
</body>
</html>
