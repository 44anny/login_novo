<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
</head>
<body class="cadastro" >
    
    <div class="container">
    <h2>Faça seu cadastro</h2>
    <form id="cadastroForm">
        <label for="nome">Nome Completo *</label>
        <input type="text" id="nome" name="nome" required>

        <label for="email">E-mail *</label>
        <input type="email" id="email" name="email" required>

        <label for="telefone">Telefone *</label>
        <input type="tel" id="telefone" name="telefone" pattern="\d{10,11}" placeholder="Apenas números" required>

        <label for="cpf">CPF *</label>
        <input type="text" id="cpf" name="cpf" pattern="\d{11}" placeholder="00000000000" required>

        <label for="cupom">Código do Cupom Fiscal *</label>
        <input type="text" id="cupom" name="cupom" required>

        <label for="produto">Produto Comprado *</label>
        <select id="produto" name="produto" required>
            <option value="">Selecione</option>
            <option value="Pizza">Pizza</option>
            <option value="Acai">Açai</option>
            <option value="Tapioca">Tapioca</option>
        </select>

        <div class="error" id="errorMsg"></div>
        <button type="submit">Cadastrar</button>
    </form>
</div>
    
</body>
</html>
